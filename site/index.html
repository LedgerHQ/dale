<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DALE — Dummy APDU Logger, Explained</title>
    <style>
        body { font-family: monospace; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #1e1e1e; color: #d4d4d4; }
        h1 { color: #569cd6; }
        textarea { width: 100%; height: 200px; background: #2d2d2d; color: #d4d4d4; border: 1px solid #555; font-family: monospace; font-size: 13px; padding: 8px; box-sizing: border-box; }
        #output { width: 100%; min-height: 200px; background: #1a1a1a; border: 1px solid #555; padding: 8px; white-space: pre-wrap; word-wrap: break-word; font-size: 13px; overflow-x: auto; box-sizing: border-box; }
        button { background: #0e639c; color: white; border: none; padding: 8px 20px; cursor: pointer; font-size: 14px; margin-right: 10px; }
        button:disabled { background: #555; cursor: wait; }
        label { margin-right: 15px; }
        .controls { margin: 10px 0; display: flex; align-items: center; }
        #status { color: #888; margin-top: 5px; }
        input[type="file"] { color: #d4d4d4; }
    </style>
</head>
<body>
    <h1>DALE</h1>
    <p>Paste APDUs or upload a file (raw APDU or Ledger Live JSON log)</p>

    <input type="file" id="fileInput" accept=".txt,.json,.log">
    <div class="controls">
        <label><input type="checkbox" id="reverse"> Reverse order</label>
        <button id="decodeBtn" disabled>Loading Pyodide...</button>
    </div>

    <textarea id="input" placeholder="=> e003000300&#10;<= 4229c1943bd1...9000&#10;&#10;Or upload a file above"></textarea>

    <div id="apduBoxContainer" style="display: none;">
        <h2>Extracted APDUs</h2>
        <textarea id="apduBox" readonly placeholder="Extracted APDUs will appear here..."></textarea>
    </div>

    <h2>Output</h2>
    <div id="output">Waiting for input...</div>
    <div id="status"></div>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.27.5/full/pyodide.js"></script>
    <script>
        let pyodide = null;

        async function initPyodide() {
            const status = document.getElementById("status");
            status.textContent = "Loading Python runtime...";
            pyodide = await loadPyodide();

            // Install dependencies from requirements.txt
            status.textContent = "Installing packages...";
            await pyodide.loadPackage("micropip");
            const micropip = pyodide.pyimport("micropip");
            const reqResp = await fetch("requirements.txt");
            const reqText = await reqResp.text();
            const packages = reqText.split("\n").map(l => l.trim()).filter(l => l && !l.startsWith("#"));
            await micropip.install(packages);

            // Load dale source files from manifest.txt (generated by build step)
            status.textContent = "Loading DALE source...";
            const manifestResp = await fetch("manifest.txt");
            const manifestText = await manifestResp.text();
            const files = manifestText.split("\n").map(l => l.trim()).filter(l => l);

            // Create directory structure from file paths
            const dirs = new Set();
            for (const file of files) {
                const parts = file.split("/");
                for (let i = 1; i < parts.length; i++) {
                    dirs.add(parts.slice(0, i).join("/"));
                }
            }
            for (const dir of [...dirs].sort()) {
                pyodide.FS.mkdirTree("/home/pyodide/" + dir);
            }

            // Fetch and write all source files
            for (const file of files) {
                const resp = await fetch(file);
                if (!resp.ok) throw new Error(`Failed to fetch ${file}: ${resp.status}`);
                const content = await resp.text();
                pyodide.FS.writeFile("/home/pyodide/" + file, content);
            }

            pyodide.runPython(`
import sys, os
sys.path.insert(0, "/home/pyodide/")
os.environ["PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION"] = "python"
`);

            const btn = document.getElementById("decodeBtn");
            btn.textContent = "Decode";
            btn.disabled = false;
            status.textContent = "Ready.";
        }

        function decode() {
            const input = document.getElementById("input").value.trim();
            if (!input) {
                document.getElementById("output").textContent = "No input provided.";
                return;
            }

            const reverse = document.getElementById("reverse").checked;
            const output = document.getElementById("output");

            const apduBoxContainer = document.getElementById("apduBoxContainer");
            const apduBox = document.getElementById("apduBox");

            try {
                pyodide.globals.set("_dale_input", input);
                pyodide.globals.set("_dale_reverse", reverse);
                const extracted = pyodide.runPython(`
from dale.logger import extract_apdus_web
extract_apdus_web(_dale_input, reverse=_dale_reverse)
`);
                if (extracted) {
                    apduBox.value = extracted;
                    apduBoxContainer.style.display = "block";
                } else {
                    apduBoxContainer.style.display = "none";
                    apduBox.value = "";
                }
            } catch (e) {
                apduBox.value = "Error extracting APDUs:\n" + String(e);
                apduBoxContainer.style.display = "block";
            }

            try {
                pyodide.globals.set("_dale_input", input);
                pyodide.globals.set("_dale_reverse", reverse);
                const result = pyodide.runPython(`
from dale.logger import main_web
main_web(_dale_input, reverse=_dale_reverse)
`);
                output.textContent = result;
            } catch (e) {
                output.textContent = "Error:\n" + String(e);
            }
        }

        document.getElementById("decodeBtn").addEventListener("click", decode);

        // File upload fills the textarea
        document.getElementById("fileInput").addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById("input").value = reader.result;
            };
            reader.readAsText(file);
        });

        initPyodide().catch(e => {
            document.getElementById("status").textContent = "Failed to load: " + String(e);
            console.error(e);
        });
    </script>
</body>
</html>
